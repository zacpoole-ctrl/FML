<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FML Q2 2026 — Auction Draft</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh}
.header{background:#0a0a0f;border-bottom:1px solid #1e1e2e;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.logo{font-size:18px;font-weight:700;letter-spacing:0.15em;color:#fff}.logo span{color:#e5b800}
.logo-sub{font-size:11px;color:#555;margin-top:2px}
.main{display:grid;grid-template-columns:1fr 320px;gap:16px;max-width:1100px;margin:0 auto;padding:1.25rem}
/* LEFT — film selector + bidding */
.panel{background:#111118;border:1px solid #1e1e2e;border-radius:12px;padding:1.25rem}
.panel-title{font-size:11px;font-weight:600;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem}
.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-bottom:1.25rem;max-height:320px;overflow-y:auto}
.film-btn{background:#0d0d18;border:1px solid #1e1e2e;border-radius:8px;padding:8px 10px;cursor:pointer;text-align:left;transition:border-color 0.1s}
.film-btn:hover{border-color:#3e3e6e}
.film-btn.active{border-color:#e5b800;background:#1a1800}
.film-btn.sold{opacity:0.35;cursor:default;pointer-events:none}
.film-btn .ft{font-size:12px;font-weight:500;color:#e8e8e8;line-height:1.3}
.film-btn .fv{font-size:10px;color:#555;margin-top:3px}
.film-btn.sold .ft{text-decoration:line-through}
.write-in-row{display:flex;gap:8px;margin-bottom:1rem}
.write-in-row input{flex:1;background:#0a0a0f;border:1px solid #2e2e4e;border-radius:6px;color:#e8e8e8;font-size:13px;padding:6px 10px}
.write-in-row button{background:#1a1a3a;border:1px solid #3e3e6e;border-radius:6px;color:#e8e8e8;font-size:12px;padding:6px 12px;cursor:pointer;white-space:nowrap}
/* on deck */
.on-deck{background:#0d0d18;border:1px solid #2e2e4e;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.on-deck-label{font-size:10px;font-weight:600;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.on-deck-title{font-size:20px;font-weight:700;color:#e5b800;margin-bottom:1rem;min-height:28px}
.bid-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bid-row select,.bid-row input{background:#0a0a0f;border:1px solid #2e2e4e;border-radius:6px;color:#e8e8e8;font-size:14px;padding:7px 10px}
.bid-row select{min-width:180px}
.bid-row input{width:80px}
.btn-award{background:#1a3a1a;border:1px solid #2e6e2e;border-radius:6px;color:#4a9e4a;font-size:14px;font-weight:600;padding:7px 18px;cursor:pointer}
.btn-award:hover{background:#2a5a2a}
.btn-undo{background:#2a1a1a;border:1px solid #6e2e2e;border-radius:6px;color:#9e4a4a;font-size:12px;padding:7px 12px;cursor:pointer}
.btn-undo:hover{background:#3a2a2a}
.btn-undo:disabled{opacity:0.3;cursor:default}
.no-film{font-size:13px;color:#444;font-style:italic}
/* RIGHT — budgets + results */
.right-col{display:flex;flex-direction:column;gap:12px}
.budget-card{background:#111118;border:1px solid #1e1e2e;border-radius:10px;padding:0.875rem 1rem}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.budget-name{font-size:13px;font-weight:600;color:#e8e8e8}
.budget-left{font-size:13px;font-weight:700;color:#e5b800}
.budget-left.low{color:#9e4a4a}
.budget-bar-bg{height:4px;background:#1e1e2e;border-radius:2px;margin-bottom:8px}
.budget-bar{height:4px;background:#e5b800;border-radius:2px;transition:width 0.3s}
.budget-bar.low{background:#9e4a4a}
.picks-list{font-size:11px;color:#555}
.pick-item{display:flex;justify-content:space-between;padding:2px 0;color:#888}
.pick-item span:last-child{color:#e5b800;font-weight:600}
/* results log */
.log-panel{background:#111118;border:1px solid #1e1e2e;border-radius:12px;padding:1rem}
.log-entry{font-size:12px;color:#888;padding:5px 0;border-bottom:1px solid #0d0d18;display:flex;justify-content:space-between}
.log-entry:last-child{border-bottom:none}
.log-entry .le-film{color:#e8e8e8;font-weight:500}
.log-entry .le-winner{color:#4a9edd}
.log-entry .le-cost{color:#e5b800;font-weight:600}
.log-empty{font-size:12px;color:#333;font-style:italic}
.picks-needed{font-size:10px;color:#555;margin-top:2px}
.complete-badge{font-size:10px;background:#1a2a1a;color:#4a9e4a;padding:2px 7px;border-radius:4px;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">F<span>M</span>L <span style="color:#555;font-weight:400;font-size:14px;letter-spacing:0">Q2 2026 Auction</span></div><div class="logo-sub">Commissioner view &bull; $100 budget per team &bull; 4 picks each</div></div>
  <button class="btn-undo" id="undo-btn" onclick="undoLast()" disabled>&#8592; Undo Last</button>
</div>

<div class="main">
  <div>
    <!-- Film selector -->
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-title">Film Pool — click to put up for bid</div>
      <div class="film-grid" id="film-grid"></div>
      <div class="write-in-row">
        <input type="text" id="wi-input" placeholder="Write-in film name...">
        <button onclick="addWriteIn()">+ Add Write-In</button>
      </div>
    </div>

    <!-- On deck / bidding -->
    <div class="panel">
      <div class="panel-title">On the Clock</div>
      <div class="on-deck">
        <div class="on-deck-label">Current Film</div>
        <div class="on-deck-title" id="deck-title"><span class="no-film">Select a film above</span></div>
        <div class="bid-row">
          <select id="bid-team">
            <option value="">— Winner —</option>
            <option value="AC">The Final Cut (AC)</option>
            <option value="BL">Complex Productions (BL)</option>
            <option value="DR">Fuck David Zaslav Pictures (DR)</option>
            <option value="JC">Studio Six Productions (JC)</option>
            <option value="ZP">Box Office Bandits (ZP)</option>
          </select>
          <input type="number" id="bid-amount" min="1" max="100" placeholder="$" style="width:70px">
          <button class="btn-award" onclick="awardFilm()">Award &#10003;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-title">Team Budgets</div>
      <div id="budgets"></div>
    </div>
    <div class="log-panel">
      <div class="panel-title" style="margin-bottom:0.75rem">Draft Results</div>
      <div id="log"><div class="log-empty">No picks yet</div></div>
    </div>
  </div>
</div>

<script>
const TEAMS = [
  {id:'AC', name:'The Final Cut', short:'AC'},
  {id:'BL', name:'Complex Productions', short:'BL'},
  {id:'DR', name:'Fuck David Zaslav Pictures', short:'DR'},
  {id:'JC', name:'Studio Six Productions', short:'JC'},
  {id:'ZP', name:'Box Office Bandits', short:'ZP'}
];
const BUDGET = 100;
const MAX_PICKS = 4;

const BASE_FILMS = [
  'Super Mario Galaxy Movie','Disclosure Day','Michael','Star Wars: Mando and Grogu',
  'Toy Story 5','The Devil Wears Prada 2','Scary Movie 6','Supergirl','Jackass 5',
  'You, Me, and Tuscany','Over Your Dead Body','I Love Boosters','Passengers',
  'In the Grey','The Drama','The Mummy','Obsession','Backrooms',
  'The Sheep Detectives','Mother Mary','Erupcja'
];

let films = BASE_FILMS.map((t,i)=>({id:i+1, title:t, sold:false}));
let writeIns = [];
let picks = []; // {filmId, filmTitle, teamId, cost}
let currentFilmId = null;
let history = []; // for undo

function allFilms(){ return [...films, ...writeIns]; }

function spent(teamId){ return picks.filter(p=>p.teamId===teamId).reduce((a,p)=>a+p.cost,0); }
function pickCount(teamId){ return picks.filter(p=>p.teamId===teamId).length; }
function remaining(teamId){ return BUDGET - spent(teamId); }

function renderFilmGrid(){
  const all = allFilms();
  document.getElementById('film-grid').innerHTML = all.map(f=>`
    <button class="film-btn ${f.sold?'sold':''} ${currentFilmId===f.id?'active':''}" onclick="selectFilm(${f.id})">
      <div class="ft">${f.title}</div>
      ${f.sold ? '<div class="fv">Sold</div>' : ''}
    </button>`).join('');
}

function renderBudgets(){
  document.getElementById('budgets').innerHTML = TEAMS.map(t=>{
    const sp = spent(t.id), rem = remaining(t.id), cnt = pickCount(t.id);
    const pct = Math.max(0,(rem/BUDGET)*100);
    const low = rem < 20;
    const done = cnt >= MAX_PICKS;
    const teamPicks = picks.filter(p=>p.teamId===t.id);
    return `<div class="budget-card">
      <div class="budget-header">
        <span class="budget-name">${t.name}</span>
        ${done ? '<span class="complete-badge">DONE</span>' : `<span class="budget-left ${low?'low':''}">\$${rem} left</span>`}
      </div>
      <div class="budget-bar-bg"><div class="budget-bar ${low?'low':''}" style="width:${pct}%"></div></div>
      <div class="picks-list">
        ${teamPicks.map(p=>`<div class="pick-item"><span>${p.filmTitle}</span><span>\$${p.cost}</span></div>`).join('')}
        ${!done ? `<div class="picks-needed" style="color:#444;font-size:10px;margin-top:3px">${MAX_PICKS-cnt} pick${MAX_PICKS-cnt!==1?'s':''} remaining</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderLog(){
  if(!picks.length){ document.getElementById('log').innerHTML='<div class="log-empty">No picks yet</div>'; return; }
  document.getElementById('log').innerHTML = [...picks].reverse().map(p=>{
    const t = TEAMS.find(x=>x.id===p.teamId);
    return `<div class="log-entry">
      <span><span class="le-film">${p.filmTitle}</span><br><span class="le-winner">${t.name}</span></span>
      <span class="le-cost">\$${p.cost}</span>
    </div>`;
  }).join('');
}

function selectFilm(id){
  const f = allFilms().find(x=>x.id===id);
  if(!f || f.sold) return;
  currentFilmId = id;
  document.getElementById('deck-title').textContent = f.title;
  document.getElementById('bid-amount').value = '';
  document.getElementById('bid-team').value = '';
  renderFilmGrid();
}

function awardFilm(){
  const teamId = document.getElementById('bid-team').value;
  const cost = parseInt(document.getElementById('bid-amount').value);
  if(!currentFilmId){ alert('Select a film first.'); return; }
  if(!teamId){ alert('Select a winning team.'); return; }
  if(!cost || cost < 1){ alert('Enter a valid bid amount.'); return; }
  const t = TEAMS.find(x=>x.id===teamId);
  if(pickCount(teamId) >= MAX_PICKS){ alert(t.name+' already has 4 picks.'); return; }
  if(cost > remaining(teamId)){ alert(t.name+' only has $'+remaining(teamId)+' left.'); return; }

  const f = allFilms().find(x=>x.id===currentFilmId);
  history.push({picks: JSON.parse(JSON.stringify(picks)), films: JSON.parse(JSON.stringify(films)), writeIns: JSON.parse(JSON.stringify(writeIns)), currentFilmId});

  picks.push({filmId:currentFilmId, filmTitle:f.title, teamId, cost});
  const src = films.find(x=>x.id===currentFilmId);
  if(src) src.sold = true;
  else { const wi = writeIns.find(x=>x.id===currentFilmId); if(wi) wi.sold=true; }

  currentFilmId = null;
  document.getElementById('deck-title').innerHTML = '<span class="no-film">Select a film above</span>';
  document.getElementById('bid-team').value = '';
  document.getElementById('bid-amount').value = '';
  document.getElementById('undo-btn').disabled = false;
  renderFilmGrid(); renderBudgets(); renderLog();
}

function undoLast(){
  if(!history.length) return;
  const prev = history.pop();
  picks = prev.picks;
  films = prev.films;
  writeIns = prev.writeIns;
  currentFilmId = prev.currentFilmId;
  if(currentFilmId){
    const f = allFilms().find(x=>x.id===currentFilmId);
    document.getElementById('deck-title').textContent = f ? f.title : '';
  } else {
    document.getElementById('deck-title').innerHTML = '<span class="no-film">Select a film above</span>';
  }
  document.getElementById('undo-btn').disabled = history.length === 0;
  renderFilmGrid(); renderBudgets(); renderLog();
}

function addWriteIn(){
  const inp = document.getElementById('wi-input');
  const title = inp.value.trim();
  if(!title) return;
  if(writeIns.length >= 5){ alert('Maximum 5 write-ins reached.'); return; }
  const id = 1000 + writeIns.length + 1;
  writeIns.push({id, title, sold:false});
  inp.value = '';
  renderFilmGrid();
}

renderFilmGrid(); renderBudgets(); renderLog();
</script>
</body>
</html>
