<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FML 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e8e8e8;min-height:100vh}
.header{background:#0a0a0f;border-bottom:1px solid #1e1e2e;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:20px;font-weight:700;letter-spacing:0.2em;color:#fff}.logo span{color:#e5b800}
.sub{font-size:11px;color:#555;margin-top:2px}
.nav{display:flex;gap:4px}
.nav button{background:transparent;border:none;color:#666;font-size:13px;padding:6px 12px;border-radius:6px;cursor:pointer}
.nav button.active{color:#fff;background:#1e1e3a;font-weight:500}
.wrap{max-width:960px;margin:0 auto;padding:1.25rem}
.sec{display:none}.sec.on{display:block}
.sb-row{display:grid;grid-template-columns:32px 1fr 100px 100px 80px;gap:8px;align-items:center;padding:0.75rem 1rem;background:#111118;border:1px solid #1e1e2e;border-radius:10px;margin-bottom:6px}
.sb-row.head{background:transparent;border-color:transparent;padding-bottom:2px}
.sb-row.head span{font-size:10px;font-weight:600;color:#555;letter-spacing:0.08em;text-transform:uppercase}
.rank{font-size:18px;font-weight:700;color:#333}
.rank.r1{color:#e5b800}.rank.r2{color:#aaa}.rank.r3{color:#cd7f32}
.team-name{font-size:14px;font-weight:600;color:#e8e8e8}
.team-owner{font-size:11px;color:#555;margin-top:1px}
.score{font-size:16px;font-weight:700;color:#e5b800;text-align:right}
.ppd{font-size:13px;color:#4a9edd;text-align:right}
.budget{font-size:12px;color:#555;text-align:right}
.team-block{background:#111118;border:1px solid #1e1e2e;border-radius:12px;margin-bottom:12px;overflow:hidden}
.team-header{padding:0.875rem 1rem;background:#0d0d18;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e2e}
.team-header h3{font-size:14px;font-weight:600;color:#e8e8e8}
.team-header .tpts{font-size:14px;font-weight:700;color:#e5b800}
.film-table{width:100%;border-collapse:collapse}
.film-table th{font-size:10px;font-weight:600;color:#555;letter-spacing:0.08em;text-transform:uppercase;padding:6px 12px;text-align:left;border-bottom:1px solid #1e1e2e}
.film-table th.r{text-align:right}
.film-table td{font-size:13px;color:#e8e8e8;padding:8px 12px;border-bottom:1px solid #0d0d18}
.film-table td.r{text-align:right;color:#888}
.film-table td.fpts{text-align:right;font-weight:600;color:#e5b800}
.film-table td.fppd{text-align:right;color:#4a9edd}
.film-table tr:last-child td{border-bottom:none}
.film-table tr.frow{cursor:pointer}
.film-table tr.frow:hover{background:#0d0d18}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#111118;border:1px solid #2e2e4e;border-radius:14px;padding:1.5rem;width:90%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:600;color:#e8e8e8;margin-bottom:4px}
.mclose{float:right;background:transparent;border:none;color:#666;font-size:20px;cursor:pointer;margin-top:-4px;line-height:1}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a2a}
.cat-row:last-child{border-bottom:none}
.cat-name{font-size:13px;color:#888}
.cat-raw{font-size:11px;color:#444}
.cat-pts{font-size:13px;font-weight:600;color:#e5b800}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:0.875rem;border-top:1px solid #2e2e4e}
.total-row span:first-child{font-size:14px;font-weight:600;color:#e8e8e8}
.total-row span:last-child{font-size:22px;font-weight:700;color:#e5b800}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.acard{background:#111118;border:1px solid #1e1e2e;border-radius:10px;padding:1rem}
.acard h3{font-size:12px;font-weight:600;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.acard .asub{font-size:11px;color:#444;margin-bottom:10px}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fr label{font-size:12px;color:#555;width:95px;flex-shrink:0}
.fr input{background:#0a0a0f;border:1px solid #2e2e4e;border-radius:5px;color:#e8e8e8;font-size:13px;padding:3px 7px;width:75px}
.sbtn{margin-top:10px;background:#1a1a3a;border:1px solid #3e3e6e;border-radius:6px;color:#e8e8e8;font-size:12px;padding:6px 14px;cursor:pointer;width:100%}
.sbtn:hover{background:#2a2a5a}
.notice{font-size:12px;color:#4a9e4a;margin-top:6px;display:none;text-align:center}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">F<span>M</span>L</div><div class="sub">Fantasy Movie League &bull; 2026</div></div>
  <nav class="nav">
    <button class="active" onclick="show('board',this)">Scoreboard</button>
    <button onclick="show('rosters',this)">Rosters</button>
    <button onclick="show('admin',this)">Admin</button>
  </nav>
</div>
<div class="wrap">
  <div id="board" class="sec on">
    <div class="sb-row head"><span></span><span>Team</span><span style="text-align:right">Score</span><span style="text-align:right">PPD Avg</span><span style="text-align:right">Budget</span></div>
    <div id="sb-list"></div>
  </div>
  <div id="rosters" class="sec"><div id="roster-list"></div></div>
  <div id="admin" class="sec"><div class="admin-grid" id="admin-grid"></div></div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="mclose" onclick="closeModal()">&#x2715;</button>
    <h2 id="m-title"></h2>
    <div id="m-sub" style="font-size:12px;color:#555;margin-bottom:1.25rem"></div>
    <div id="m-cats"></div>
    <div class="total-row"><span>Total Points</span><span id="m-total"></span></div>
  </div>
</div>
<script>
const TEAMS=[

  {id:'JC',name:'Studio Six Productions',owner:'JC',budget:75},
  {id:'ZP',name:'Box Office Bandits',owner:'ZP',budget:63}

const DEF=[
  {id:1,team:'AC',title:'Wuthering Heights',cost:40,bo:234.404,lbd:3.9,mc:77,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:2,team:'AC',title:'28 Years Later: The Bone Temple',cost:35,bo:57.9,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:3,team:'AC',title:'Return to Silent Hill',cost:5,bo:43.0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:4,team:'AC',title:'We Bury the Dead',cost:1,bo:3.9,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:5,team:'BL',title:'Dracula',cost:38,bo:42.3,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:6,team:'BL',title:'Ready or Not 2',cost:30,bo:11.9,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:7,team:'BL',title:'How to Make a Killing',cost:3,bo:11.5,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:8,team:'BL',title:'Peaky Blinders: The Immortal Man',cost:5,bo:0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:9,team:'DR',title:'Hoppers',cost:50,bo:242.6,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:10,team:'DR',title:'GOAT',cost:14,bo:174.5,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:11,team:'DR',title:'Send Help',cost:31,bo:93.9,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:12,team:'DR',title:'The Breadwinner',cost:5,bo:0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:13,team:'JC',title:'Project Hail Mary',cost:72,bo:141.0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:14,team:'JC',title:'Reminders of Him',cost:1,bo:54.0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:15,team:'JC',title:'I Can Only Imagine 2',cost:1,bo:18.4,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:16,team:'JC',title:'Psycho Killer',cost:1,bo:2.6,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:17,team:'ZP',title:'Scream 7',cost:36,bo:193.8,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:18,team:'ZP',title:'Mercy',cost:11,bo:54.3,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:19,team:'ZP',title:'The Bride!',cost:12,bo:23.2,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0},
  {id:20,team:'ZP',title:'Redux Redux',cost:4,bo:0,lbd:0,mc:0,oscN:0,oscW:0,ggN:0,ggW:0,ccN:0,ccW:0,sagN:0,sagW:0,dgaN:0,dgaW:0,baftaN:0,baftaW:0,wgaN:0,wgaW:0,pgaN:0,pgaW:0}
];
function lf(){const s=localStorage.getItem('fml2');return s?JSON.parse(s):DEF;}
function sf(d){localStorage.setItem('fml2',JSON.stringify(d));}
function sc(f){
  const bo=f.bo,lbd=(f.lbd||0)*3,mc=(f.mc||0)*0.15;
  const osc=(f.oscN||0)+(f.oscW||0)*4,gg=(f.ggN||0)+(f.ggW||0)*2,cc=(f.ccN||0)+(f.ccW||0)*2;
  const sag=(f.sagN||0)+(f.sagW||0)*2,dga=(f.dgaN||0)+(f.dgaW||0)*2,bafta=(f.baftaN||0)+(f.baftaW||0)*2;
  const wga=(f.wgaN||0)+(f.wgaW||0)*2,pga=(f.pgaN||0)+(f.pgaW||0)*2;
  const total=bo+lbd+mc+osc+gg+cc+sag+dga+bafta+wga+pga;
  return{bo,lbd,mc,osc,gg,cc,sag,dga,bafta,wga,pga,total};
}
function ts(films,tid){
  const tf=films.filter(f=>f.team===tid);
  const scored=tf.map(f=>({f,s:sc(f)}));
  const total=scored.reduce((a,x)=>a+x.s.total,0);
  const ppdAvg=scored.reduce((a,x)=>a+(x.f.cost>0?x.s.total/x.f.cost:0),0)/scored.length;
  return{total,ppdAvg,scored};
}
function renderBoard(){
  const films=lf();
  const teams=TEAMS.map(t=>({...t,...ts(films,t.id)})).sort((a,b)=>b.total-a.total);
  const rc=['r1','r2','r3','',''];
  document.getElementById('sb-list').innerHTML=teams.map((t,i)=>
    '<div class="sb-row"><div class="rank '+rc[i]+'">'+(i+1)+'</div><div><div class="team-name">'+t.name+'</div><div class="team-owner">'+t.owner+'</div></div><div class="score">'+t.total.toFixed(2)+'</div><div class="ppd">'+t.ppdAvg.toFixed(2)+'</div><div class="budget">'+t.budget+'</div></div>'
  ).join('');
}
function renderRosters(){
  const films=lf();
  document.getElementById('roster-list').innerHTML=TEAMS.map(t=>{
    const{total,scored}=ts(films,t.id);
    const rows=scored.map(({f,s})=>
      '<tr class="frow" onclick="openModal('+f.id+')"><td>'+f.title+'</td><td class="r">'+f.cost+'</td><td class="r">'+f.bo.toFixed(1)+'</td><td class="fpts">'+s.total.toFixed(2)+'</td><td class="fppd">'+(f.cost>0?(s.total/f.cost).toFixed(2):'&#x2014;')+'</td></tr>'
    ).join('');
    return '<div class="team-block"><div class="team-header"><h3>'+t.name+' <span style="font-weight:400;color:#555;font-size:12px">('+t.owner+')</span></h3><span class="tpts">'+total.toFixed(2)+' pts</span></div><table class="film-table"><tr><th>Film</th><th class="r">Cost</th><th class="r">B.O. ($M)</th><th class="r">Pts</th><th class="r">PPD</th></tr>'+rows+'</table></div>';
  }).join('');
}
function openModal(fid){
  const f=lf().find(x=>x.id===fid),s=sc(f),t=TEAMS.find(x=>x.id===f.team);
  document.getElementById('m-title').textContent=f.title;
  document.getElementById('m-sub').textContent=t.name+' \u2014 Cost: '+f.cost;
  const cats=[['Box Office','$'+f.bo+'M',s.bo],['Letterboxd',''+f.lbd,s.lbd],['MetaCritic',''+f.mc,s.mc],['Oscars',f.oscN+'N/'+f.oscW+'W',s.osc],['Golden Globes',f.ggN+'N/'+f.ggW+'W',s.gg],['Critics Choice',f.ccN+'N/'+f.ccW+'W',s.cc],['SAG',f.sagN+'N/'+f.sagW+'W',s.sag],['DGA',f.dgaN+'N/'+f.dgaW+'W',s.dga],['BAFTA',f.baftaN+'N/'+f.baftaW+'W',s.bafta],['WGA',f.wgaN+'N/'+f.wgaW+'W',s.wga],['PGA',f.pgaN+'N/'+f.pgaW+'W',s.pga]];
  document.getElementById('m-cats').innerHTML=cats.map(([n,r,p])=>'<div class="cat-row"><span class="cat-name">'+n+' <span class="cat-raw">('+r+')</span></span><span class="cat-pts">'+p.toFixed(2)+'</span></div>').join('');
  document.getElementById('m-total').textContent=s.total.toFixed(2);
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
function renderAdmin(){
  const films=lf();
  document.getElementById('admin-grid').innerHTML=films.map(f=>{
    const t=TEAMS.find(x=>x.id===f.team);
    const fields=[['bo','Box Office ($M)','0.001'],['lbd','Letterboxd','0.1'],['mc','MetaCritic','1'],['oscN','Oscar Noms','1'],['oscW','Oscar Wins','1'],['ggN','GG Noms','1'],['ggW','GG Wins','1'],['ccN','CC Noms','1'],['ccW','CC Wins','1'],['sagN','SAG Noms','1'],['sagW','SAG Wins','1'],['dgaN','DGA Noms','1'],['dgaW','DGA Wins','1'],['baftaN','BAFTA Noms','1'],['baftaW','BAFTA Wins','1'],['wgaN','WGA Noms','1'],['wgaW','WGA Wins','1'],['pgaN','PGA Noms','1'],['pgaW','PGA Wins','1']];
    return '<div class="acard"><h3>'+f.title+'</h3><div class="asub">'+t.name+' &bull; Cost: '+f.cost+'</div>'+fields.map(([k,lbl,step])=>'<div class="fr"><label>'+lbl+'</label><input type="number" step="'+step+'" value="'+(f[k]||0)+'" data-id="'+f.id+'" data-field="'+k+'"></div>').join('')+'<button class="sbtn" onclick="saveFilm('+f.id+')">Save</button><div class="notice" id="saved-'+f.id+'">Saved!</div></div>';
  }).join('');
}
function saveFilm(fid){
  const films=lf(),f=films.find(x=>x.id===fid);
  document.querySelectorAll('[data-id="'+fid+'"]').forEach(inp=>{f[inp.dataset.field]=parseFloat(inp.value)||0;});
  sf(films);renderBoard();renderRosters();
  const n=document.getElementById('saved-'+fid);n.style.display='block';setTimeout(()=>n.style.display='none',2000);
}
function show(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('on');btn.classList.add('active');
  if(id==='admin')renderAdmin();
}
renderBoard();renderRosters();
</script>
</body>
</html>
